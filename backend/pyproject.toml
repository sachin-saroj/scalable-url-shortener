[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
# E, W: pycodestyle
# F: Pyflakes (detects unused imports, variables, etc.)
# I: isort (imports sorting)
# N: pep8-naming
# UP: pyupgrade (modern syntax upgrade)
# B: flake8-bugbear (common design issues/bugs)
# C4: flake8-comprehensions
# ASYNC: flake8-async (async coding bugs/bad patterns)
# RUF: Ruff-specific rules
select = [
    "E", "W",     # pycodestyle
    "F",          # Pyflakes
    "I",          # isort
    "N",          # pep8-naming
    "UP",         # pyupgrade
    "B",          # flake8-bugbear
    "C4",         # flake8-comprehensions
    "ASYNC",      # flake8-async
    "RUF"         # Ruff rules
]
ignore = [
    "B008",       # Allow function calls in parameter defaults (vital for FastAPI Depends)
    "N802",       # Allow uppercase function/property names for setting matching
    "B904",       # Allow raising exceptions without explicit 'from' chaining at boundaries
]

# Configure Ruff to automatically fix violations where safe
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party = ["app"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
plugins = [
    "sqlalchemy.ext.mypy.plugin"
]
strict = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_decorators = false
warn_unused_ignores = true
warn_redundant_casts = true

